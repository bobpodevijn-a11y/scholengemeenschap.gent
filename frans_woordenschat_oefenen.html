                    { fr: "végane", nl: "veganistisch", example: "Elle ne mange plus de viande, elle préfère un repas végane" },
                    { fr: "vintage", nl: "vintage, oud", example: "Plusieurs jeunes aiment les vêtements vintages" }
                ],
                verbes: [
                    { fr: "découvrir", nl: "ontdekken", example: "J'aimerais découvrir la culture de la population locale." },
                    { fr: "explorer", nl: "verkennen", example: "Commençons par explorer la ville." },
                    { fr: "inspirer", nl: "inspireren, inspiratie geven", example: "Tes idées peuvent inspirer les autres." },
                    { fr: "redécouvrir", nl: "herontdekken", example: "Il y a 15 ans, j'ai visité la ville de Paris. Maintenant, je veux redécouvrir la ville." },

                ]

            "En route 4": {
                substantifs: [
                    { fr: "une amende", nl: "een boete", example: "Cet homme n'avait pas de billet valable: il devait payer une amende" },
                    { fr: "un appartement", nl: "een appartement", example: "Quel est le prix d'un appartement dans le centre de Paris?" },
                    { fr: "un arrêt", nl: "een halte", example: "On doit descendre du métro à l'arrêt suivant." },

                    { fr: "une direction", nl: "een richting", example: "Oups! Ce métro roule dans l'autre direction" },

                    { fr: "une gare", nl: "een station (trein)", example: "Beaucoup de touristes arrivent à la gare du Nord à Paris." },

                    { fr: "efficace", nl: "efficiënt", example: "Le métro est un moyen de transport très efficace dans une grande ville." },
                    { fr: "meilleur marché (invariable)", nl: "goedkoper", example: "Est-ce qu'une chambre d'hôtes est meilleur marché qu'un hôtel?" }
                ],
                verbes: [
                    { fr: "descendre", nl: "afstappen", example: "Au prochain arrêt, nous devons descendre" },
                    { fr: "monter", nl: "opstappen", example: "Aux heures de pointe, il n'est pas facile de monter dans le métro." },
                    { fr: "rater", nl: "missen", example: "Dépêchons-nous pour ne pas rater notre correspondance." },
                    { fr: "traverser", nl: "doorlopen, doorkruisen", example: "En métro, on peut traverser toute la ville en peu de temps." }

                expressions: [
                    { fr: "être en fraude", nl: "in overtreding zijn", example: "Si tu ne paies pas pour un billet, tu es en fraude" }
                ]
            }

        function FrenchVocabApp() {
            const [mode, setMode] = useState('menu');
            const [selectedRoute, setSelectedRoute] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showAnswer, setShowAnswer] = useState(false);
            const [userInput, setUserInput] = useState('');
            const [score, setScore] = useState({ correct: 0, total: 0 });
            const [shuffledWords, setShuffledWords] = useState([]);
            const [feedback, setFeedback] = useState('');
            const [options, setOptions] = useState([]);

            const getAllWords = () => {
                if (!selectedRoute || !selectedCategory) return [];
                const route = vocabularyData[selectedRoute];
                return route[selectedCategory] || [];
            };

            const startMode = (newMode) => {
                const words = getAllWords();
                if (words.length === 0) return;
                
                const shuffled = [...words].sort(() => Math.random() - 0.5);
                setShuffledWords(shuffled);
                setCurrentIndex(0);
                setShowAnswer(false);
                setUserInput('');
                setScore({ correct: 0, total: 0 });
                setFeedback('');
                setMode(newMode);
            };

            const currentWord = shuffledWords[currentIndex];

            const handleNext = () => {
                if (currentIndex < shuffledWords.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setShowAnswer(false);
                    setUserInput('');
                    setFeedback('');
                }
            };

            const handlePrevious = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                    setShowAnswer(false);
                    setUserInput('');
                    setFeedback('');
                }
            };

            const normalizeText = (text) => {
                return text
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .replace(/[^a-z0-9]/g, '')
                    .trim();
            };

            const checkAnswer = () => {
                const normalized = normalizeText(userInput);
                const possibleAnswers = currentWord.nl.split(',').map(a => normalizeText(a));
                
                const isCorrect = possibleAnswers.some(answer => normalized.includes(answer) || answer.includes(normalized));
                
                setScore({
                    correct: score.correct + (isCorrect ? 1 : 0),
                    total: score.total + 1
                });
                
                setFeedback(isCorrect ? 'correct' : 'incorrect');
                
                setTimeout(() => {
                    if (currentIndex < shuffledWords.length - 1) {
                        handleNext();
                    } else {
                        setMode('results');
                    }
                }, 1500);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && userInput.trim()) {
                    checkAnswer();
                }
            };

            useEffect(() => {
                if (mode === 'multipleChoice' && currentWord) {
                    const otherWords = shuffledWords
                        .filter((w) => w.fr !== currentWord.fr)
                        .sort(() => Math.random() - 0.5)
                        .slice(0, 3);
                    const allOptions = [currentWord, ...otherWords]
                        .sort(() => Math.random() - 0.5);
                    setOptions(allOptions);
                }
            }, [currentIndex, mode, currentWord, shuffledWords]);

            if (mode === 'menu') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-4xl font-bold text-center mb-2 text-indigo-900">Frans Woordenschat Oefenen</h1>
                            <p className="text-center text-gray-600 mb-8">Kies een module en categorie om te starten</p>
                            
                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                <h2 className="text-xl font-semibold mb-4">Selecteer Module</h2>
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {Object.keys(vocabularyData).map((route) => (
                                        <button
                                            key={route}
                                            onClick={() => setSelectedRoute(route)}
                                            className={`h-auto py-4 px-4 rounded-lg border-2 transition-all ${
                                                selectedRoute === route
                                                    ? 'bg-indigo-600 text-white border-indigo-600'
                                                    : 'bg-white text-gray-700 border-gray-300 hover:border-indigo-400'
                                            }`}
                                        >
                                            {route}
                                        </button>
                                    ))}
                                </div>

                                {selectedRoute && (
                                    <>
                                        <h2 className="text-xl font-semibold mb-4">Selecteer Categorie</h2>
                                        <div className="grid grid-cols-2 gap-3">
                                            {Object.keys(vocabularyData[selectedRoute]).map((category) => {
                                                const count = vocabularyData[selectedRoute][category].length;
                                                return (
                                                    <button
                                                        key={category}
                                                        onClick={() => setSelectedCategory(category)}
                                                        className={`h-auto py-4 px-4 rounded-lg border-2 transition-all ${
                                                            selectedCategory === category
                                                                ? 'bg-indigo-600 text-white border-indigo-600'
                                                                : 'bg-white text-gray-700 border-gray-300 hover:border-indigo-400'
                                                        }`}
                                                    >
                                                        <div className="text-left w-full">
                                                            <div className="font-semibold capitalize">{category}</div>
                                                            <div className="text-xs opacity-75">{count} woorden</div>
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </>
                                )}
                            </div>

                            {selectedRoute && selectedCategory && (
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <h2 className="text-xl font-semibold mb-4">Kies Oefentype</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <button
                                            onClick={() => startMode('flashcards')}
                                            className="h-24 text-lg flex flex-col items-center justify-center gap-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all"
                                        >
                                            <span className="text-2xl">📚</span>
                                            Flashcards
                                        </button>
                                        <button
                                            onClick={() => startMode('fillIn')}
                                            className="h-24 text-lg flex flex-col items-center justify-center gap-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all"
                                        >
                                            <span className="text-2xl">✏️</span>
                                            Invuloefening
                                        </button>
                                        <button
                                            onClick={() => startMode('multipleChoice')}
                                            className="h-24 text-lg flex flex-col items-center justify-center gap-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all"
                                        >
                                            <span className="text-2xl">📋</span>
                                            Meerkeuze
                                        </button>
                                        <button
                                            onClick={() => startMode('exampleContext')}
                                            className="h-24 text-lg flex flex-col items-center justify-center gap-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all"
                                        >
                                            <span className="text-2xl">🔀</span>
                                            Context Voorbeelden
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (mode === 'flashcards') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setMode('menu')} className="px-4 py-2 bg-white rounded-lg border border-gray-300 hover:bg-gray-50">
                                    ← Terug naar menu
                                </button>
                                <div className="text-sm text-gray-600">
                                    {currentIndex + 1} / {shuffledWords.length}
                                </div>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-12 mb-6 cursor-pointer" onClick={() => setShowAnswer(!showAnswer)}>
                                <div className="text-center">
                                    <div className="text-3xl font-bold text-indigo-900 mb-4">
                                        {currentWord.fr}
                                    </div>
                                    {showAnswer && (
                                        <>
                                            <div className="text-2xl text-gray-700 mb-4">
                                                {currentWord.nl}
                                            </div>
                                            <div className="text-sm text-gray-600 italic border-t pt-4 mt-4">
                                                {currentWord.example}
                                            </div>
                                        </>
                                    )}
                                    {!showAnswer && (
                                        <div className="text-gray-400 text-sm mt-8">
                                            Klik om het antwoord te zien
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <button
                                    onClick={handlePrevious}
                                    disabled={currentIndex === 0}
                                    className="flex-1 py-3 px-6 bg-white rounded-lg border border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    ← Vorige
                                </button>
                                <button
                                    onClick={handleNext}
                                    disabled={currentIndex === shuffledWords.length - 1}
                                    className="flex-1 py-3 px-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    Volgende →
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'fillIn') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setMode('menu')} className="px-4 py-2 bg-white rounded-lg border border-gray-300 hover:bg-gray-50">
                                    ← Terug naar menu
                                </button>
                                <div className="text-sm text-gray-600">
                                    Score: {score.correct} / {score.total} ({shuffledWords.length - score.total} te gaan)
                                </div>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-8 mb-6">
                                <div className="mb-6">
                                    <div className="text-xl font-semibold text-gray-700 mb-2">
                                        Vertaal naar het Nederlands:
                                    </div>
                                    <div className="text-3xl font-bold text-indigo-900 mb-6">
                                        {currentWord.fr}
                                    </div>
                                    <div className="text-sm text-gray-600 italic mb-6">
                                        Context: {currentWord.example}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <input
                                        type="text"
                                        value={userInput}
                                        onChange={(e) => setUserInput(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Typ het Nederlandse woord..."
                                        className="w-full text-lg p-4 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none"
                                        disabled={feedback !== ''}
                                    />

                                    {feedback === 'correct' && (
                                        <div className="bg-green-100 border-2 border-green-400 text-green-700 px-4 py-3 rounded-lg flex items-center">
                                            <span className="mr-2">✓</span>
                                            Juist! {currentWord.nl}
                                        </div>
                                    )}

                                    {feedback === 'incorrect' && (
                                        <div className="bg-red-100 border-2 border-red-400 text-red-700 px-4 py-3 rounded-lg flex items-center">
                                            <span className="mr-2">✗</span>
                                            Helaas, het juiste antwoord was: {currentWord.nl}
                                        </div>
                                    )}

                                    {feedback === '' && (
                                        <button
                                            onClick={checkAnswer}
                                            disabled={!userInput.trim()}
                                            className="w-full text-lg py-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Controleer
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'multipleChoice') {
                const handleOptionClick = (option) => {
                    const isCorrect = option.fr === currentWord.fr;
                    setScore({
                        correct: score.correct + (isCorrect ? 1 : 0),
                        total: score.total + 1
                    });
                    setFeedback(isCorrect ? 'correct' : 'incorrect');
                    
                    setTimeout(() => {
                        if (currentIndex < shuffledWords.length - 1) {
                            handleNext();
                        } else {
                            setMode('results');
                        }
                    }, 1500);
                };

                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setMode('menu')} className="px-4 py-2 bg-white rounded-lg border border-gray-300 hover:bg-gray-50">
                                    ← Terug naar menu
                                </button>
                                <div className="text-sm text-gray-600">
                                    Score: {score.correct} / {score.total} ({shuffledWords.length - score.total} te gaan)
                                </div>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-8 mb-6">
                                <div className="mb-6">
                                    <div className="text-xl font-semibold text-gray-700 mb-2">
                                        Welk Frans woord betekent:
                                    </div>
                                    <div className="text-3xl font-bold text-indigo-900 mb-6">
                                        {currentWord.nl}
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {options.map((option, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleOptionClick(option)}
                                            disabled={feedback !== ''}
                                            className={`w-full text-lg py-6 px-6 rounded-lg border-2 transition-all ${
                                                feedback === 'correct' && option.fr === currentWord.fr
                                                    ? 'bg-green-100 border-green-400'
                                                    : feedback === 'incorrect' && option.fr === currentWord.fr
                                                    ? 'bg-green-100 border-green-400'
                                                    : 'bg-white border-gray-300 hover:border-indigo-400'
                                            } disabled:cursor-not-allowed`}
                                        >
                                            {option.fr}
                                        </button>
                                    ))}
                                </div>

                                {feedback === 'correct' && (
                                    <div className="mt-4 bg-green-100 border-2 border-green-400 text-green-700 px-4 py-3 rounded-lg flex items-center">
                                        <span className="mr-2">✓</span>
                                        Juist!
                                    </div>
                                )}

                                {feedback === 'incorrect' && (
                                    <div className="mt-4 bg-red-100 border-2 border-red-400 text-red-700 px-4 py-3 rounded-lg flex items-center">
                                        <span className="mr-2">✗</span>
                                        Helaas, het juiste antwoord was: {currentWord.fr}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'exampleContext') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setMode('menu')} className="px-4 py-2 bg-white rounded-lg border border-gray-300 hover:bg-gray-50">
                                    ← Terug naar menu
                                </button>
                                <div className="text-sm text-gray-600">
                                    Score: {score.correct} / {score.total} ({shuffledWords.length - score.total} te gaan)
                                </div>
                            </div>

                            <div className="bg-white rounded-lg shadow-lg p-8 mb-6">
                                <div className="mb-6">
                                    <div className="text-xl font-semibold text-gray-700 mb-4">
                                        Vul het juiste woord in:
                                    </div>
                                    <div className="text-lg text-gray-800 mb-6 leading-relaxed">
                                        {currentWord.example}
                                    </div>
                                    <div className="text-sm text-gray-500">
                                        Hint: {currentWord.nl}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <input
                                        type="text"
                                        value={userInput}
                                        onChange={(e) => setUserInput(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Typ het Franse woord..."
                                        className="w-full text-lg p-4 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none"
                                        disabled={feedback !== ''}
                                    />

                                    {feedback === 'correct' && (
                                        <div className="bg-green-100 border-2 border-green-400 text-green-700 px-4 py-3 rounded-lg flex items-center">
                                            <span className="mr-2">✓</span>
                                            Juist! {currentWord.fr}
                                        </div>
                                    )}

                                    {feedback === 'incorrect' && (
                                        <div className="bg-red-100 border-2 border-red-400 text-red-700 px-4 py-3 rounded-lg flex items-center">
                                            <span className="mr-2">✗</span>
                                            Helaas, het juiste antwoord was: {currentWord.fr}
                                        </div>
                                    )}

                                    {feedback === '' && (
                                        <button
                                            onClick={checkAnswer}
                                            disabled={!userInput.trim()}
                                            className="w-full text-lg py-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Controleer
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'results') {
                const percentage = Math.round((score.correct / score.total) * 100);
                
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                        <div className="max-w-2xl mx-auto">
                            <div className="bg-white rounded-lg shadow-lg p-12 text-center">
                                <h2 className="text-3xl font-bold mb-6 text-indigo-900">Resultaten</h2>
                                
                                <div className="mb-8">
                                    <div className="text-6xl font-bold text-indigo-600 mb-2">
                                        {percentage}%
                                    </div>
                                    <div className="text-xl text-gray-600">
                                        {score.correct} van {score.total} correct
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <button
                                        onClick={() => startMode('flashcards')}
                                        className="w-full text-lg py-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
                                    >
                                        🔄 Opnieuw oefenen
                                    </button>
                                    <button
                                        onClick={() => setMode('menu')}
                                        className="w-full text-lg py-6 bg-white border-2 border-gray-300 rounded-lg hover:bg-gray-50"
                                    >
                                        Terug naar menu
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        ReactDOM.render(<FrenchVocabApp />, document.getElementById('root'));
    </script>
</body>
</html>
